<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>StudyLens</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="katex.min.css" />
    <link rel="stylesheet" href="hljs.min.css" />
  </head>
  <body>
    <main class="shell">
      <aside class="sidebar">
        <header class="brand">
          <div class="brand-mark">SL</div>
          <div>
            <h1>StudyLens</h1>
            <span id="health-pill" class="pill neutral">Checking</span>
          </div>
        </header>

        <section class="control-group">
          <label class="field">
            <span>Backend</span>
            <input id="backend-url" value="http://localhost:8000" autocomplete="off" />
          </label>
          <button id="save-backend" class="button secondary" type="button">Save</button>
        </section>
      </aside>

      <section class="workspace">

        <!-- ── Main page: course library ─────────────────────────── -->
        <section class="view active" id="view-courses" aria-labelledby="courses-title">
          <div class="view-head">
            <h2 id="courses-title">My Courses</h2>
            <span id="courses-summary" class="subtle"></span>
          </div>
          <p class="course-intro">
            <strong>Discover</strong> pulls this term's enrolled courses from EdStem.
            Tick the ones you want, then <strong>Index selected</strong> runs Scientia,
            Panopto, past exams, and EdStem for each. Once indexed, click
            <strong>Enter →</strong> to open a course.
          </p>
          <div class="actions">
            <button id="courses-discover" class="button primary" type="button">Discover</button>
            <button id="courses-index" class="button primary" type="button" disabled>
              Index selected
            </button>
            <button id="courses-select-all" class="button secondary" type="button" hidden>
              Select all
            </button>
            <span id="courses-status" class="status"></span>
          </div>
          <ul id="courses-list" class="course-list" role="list"></ul>
          <section id="courses-progress" class="course-progress" hidden>
            <h3 class="course-progress-title">Indexing progress</h3>
            <ul id="courses-progress-list" class="course-progress-list" role="list"></ul>
          </section>
        </section>

        <!-- ── Course sub-page ───────────────────────────────────── -->
        <section class="view" id="view-course">

          <div class="course-page-header">
            <button id="back-to-courses" class="back-btn" type="button">← Courses</button>
            <div class="course-page-identity">
              <span id="course-page-code" class="course-code"></span>
              <span id="course-page-title" class="course-header-title"></span>
            </div>
            <div class="course-page-meta">
              <button id="reindex-btn" class="reindex-btn" type="button">↻ Re-index</button>
              <span id="reindex-status" class="reindex-status"></span>
            </div>
          </div>

          <nav class="course-nav" role="tablist" aria-label="Course tools">
            <button class="course-tab active" data-tab="ask" role="tab" type="button">Ask</button>
            <button class="course-tab" data-tab="generate" role="tab" type="button">Generate</button>
            <button class="course-tab course-tab-secondary" data-tab="retrieve" role="tab" type="button">Retrieve</button>
          </nav>

          <!-- Ask tab ──────────────────────────────────────────── -->
          <div class="tab-panel active" id="tab-ask" role="tabpanel">
            <div class="tab-controls">
              <label class="toggle">
                <input id="ask-exercises" type="checkbox" checked />
                <span>Exercises</span>
              </label>
              <label class="compact-field">
                <span>Top K</span>
                <input id="ask-top-k" type="number" min="1" max="20" value="5" />
              </label>
            </div>
            <label class="field large">
              <span>Question</span>
              <textarea id="ask-question" rows="5" placeholder="What is the invariant in Dijkstra?"></textarea>
            </label>
            <div class="actions">
              <button id="ask-submit" class="button primary" type="button">Ask</button>
              <span id="ask-status" class="status"></span>
            </div>
            <article id="answer-card" class="output hidden"></article>
            <section id="citation-list" class="result-list"></section>
          </div>

          <!-- Generate tab ─────────────────────────────────────── -->
          <div class="tab-panel" id="tab-generate" role="tabpanel">
            <div class="tab-controls">
              <div class="segmented" role="tablist" aria-label="Generation mode">
                <button class="segment active" data-mode="cheatsheet" type="button">Cheatsheet</button>
                <button class="segment" data-mode="exam" type="button">Predicted Paper</button>
              </div>
              <label class="compact-field">
                <span>Top K</span>
                <input id="generate-top-k" type="number" min="1" max="80" value="40" />
              </label>
              <label id="question-count-field" class="compact-field hidden">
                <span>Questions</span>
                <input id="question-count" type="number" min="1" max="8" value="4" />
              </label>
            </div>
            <label class="field large">
              <span>Scope Notes</span>
              <textarea id="scope-notes" rows="5" placeholder="One note per line"></textarea>
            </label>
            <div class="actions">
              <button id="generate-submit" class="button primary" type="button">Generate</button>
              <button id="download-latex" class="button secondary" type="button" disabled>Download .tex</button>
              <span id="generate-status" class="status"></span>
            </div>
            <pre id="latex-output" class="latex-output"></pre>
          </div>

          <!-- Retrieve tab (power-user) ────────────────────────── -->
          <div class="tab-panel" id="tab-retrieve" role="tabpanel">
            <div class="tab-controls">
              <label class="compact-field">
                <span>Top K</span>
                <input id="retrieve-top-k" type="number" min="1" max="50" value="8" />
              </label>
            </div>
            <label class="field large">
              <span>Query</span>
              <textarea id="retrieve-query" rows="4" placeholder="recurrence relation exam question"></textarea>
            </label>
            <div class="kind-grid" id="retrieve-kinds">
              <label><input type="checkbox" value="material" checked /> Material</label>
              <label><input type="checkbox" value="exercise" checked /> Exercise</label>
              <label><input type="checkbox" value="tutorial" checked /> Tutorial</label>
              <label><input type="checkbox" value="transcript" checked /> Transcript</label>
              <label><input type="checkbox" value="past_exam" checked /> Past Exam</label>
              <label><input type="checkbox" value="edstem_note" checked /> EdStem</label>
            </div>
            <div class="actions">
              <button id="retrieve-submit" class="button primary" type="button">Retrieve</button>
              <span id="retrieve-status" class="status"></span>
            </div>
            <section id="retrieve-results" class="result-list"></section>
          </div>

        </section>

      </section>
    </main>
    <script type="module" src="app.js"></script>
  </body>
</html>
