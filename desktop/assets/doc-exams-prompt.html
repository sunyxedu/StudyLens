<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        margin: 0;
        padding: 24px;
        color: #20342c;
        background: #f8faf8;
        font-family: Inter, "Segoe UI", system-ui, sans-serif;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 20px;
      }
      p {
        margin: 0 0 18px;
        color: #60756c;
        line-height: 1.45;
      }
      .subtle {
        margin: -6px 0 18px;
        color: #60756c;
        font-size: 13px;
        font-weight: 700;
      }
      label {
        display: grid;
        gap: 6px;
        margin-bottom: 12px;
        font-size: 13px;
        font-weight: 700;
      }
      input {
        box-sizing: border-box;
        width: 100%;
        border: 1px solid #cfd8d2;
        border-radius: 8px;
        padding: 10px 12px;
        font: inherit;
      }
      .actions {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
        margin-top: 18px;
      }
      button {
        border: 1px solid #cfd8d2;
        border-radius: 8px;
        padding: 9px 14px;
        font: inherit;
        font-weight: 750;
        cursor: pointer;
      }
      button[type="submit"] {
        border-color: #2e6d54;
        color: white;
        background: #2e6d54;
      }
    </style>
  </head>
  <body>
    <h1>DOC Exams sign-in</h1>
    <p>The DOC Exams site uses HTTP Basic authentication. Please enter your credentials.</p>
    <p class="subtle">StudyLens will not save anything you input in this window.</p>
    <form id="form">
      <label>
        Imperial username
        <input id="username" autocomplete="username" required autofocus />
      </label>
      <label>
        Imperial password
        <input id="password" type="password" autocomplete="current-password" required />
      </label>
      <div class="actions">
        <button id="cancel" type="button">Cancel</button>
        <button type="submit">Continue</button>
      </div>
    </form>
  </body>
</html>
